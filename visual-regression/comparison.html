
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Regression Comparison</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #333; color: white; }
        .stats { background: #444; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .container { display: flex; gap: 20px; justify-content: center; }
        .view { flex: 1; max-width: 32%; }
        img { width: 100%; border: 2px solid #666; display: block; }
        h2 { text-align: center; }
    </style>
</head>
<body>
    <h1>Visual Regression Comparison</h1>
    <div class="stats">
        <h2>Benchmark Score</h2>
        <p>Mismatch: <strong>53.30%</strong></p>
        <p>Live Height: 5334px | Local Height: 4341px</p>
    </div>
    
    <div class="container">
        <div class="view">
            <h2>Live Site</h2>
            <img src="live-site.png" alt="Live Site">
        </div>
        <div class="view">
            <h2>Diff (Heatmap)</h2>
            <img src="diff.png" alt="Diff">
        </div>
        <div class="view">
            <h2>Localhost</h2>
            <img src="localhost.png" alt="Localhost">
        </div>
    </div>
</body>
</html>
