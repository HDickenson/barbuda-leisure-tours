
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Regression Comparison</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #333; color: white; }
        .container { display: flex; gap: 20px; justify-content: center; }
        .view { flex: 1; max-width: 48%; }
        img { width: 100%; border: 2px solid #666; display: block; }
        h2 { text-align: center; }
        .slider-container {
            position: relative;
            width: 1280px;
            height: 800px; /* Adjust based on typical fold */
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid #fff;
        }
        .slider-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: top center;
        }
        .img-before { background-image: url('live-site.png'); z-index: 1; width: 50%; border-right: 2px solid red; }
        .img-after { background-image: url('localhost.png'); z-index: 0; }
        input[type="range"] {
            position: absolute;
            top: 50%;
            left: -10px;
            width: 100%;
            z-index: 10;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>Visual Regression Comparison</h1>
    <p>Open this file in your browser to compare the Live Site vs Localhost.</p>
    
    <div class="container">
        <div class="view">
            <h2>Live Site</h2>
            <img src="live-site.png" alt="Live Site">
        </div>
        <div class="view">
            <h2>Localhost</h2>
            <img src="localhost.png" alt="Localhost">
        </div>
    </div>

    <script>
        // Simple script to sync scroll if needed, but side-by-side is usually enough for full page
    </script>
</body>
</html>
