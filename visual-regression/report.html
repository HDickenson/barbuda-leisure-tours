
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Regression Report</title>
    <style>
        body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; }
        h1 { color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .summary { background: #252540; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .summary-item { text-align: center; padding: 15px; background: #1a1a2e; border-radius: 8px; }
        .summary-item.pass { border: 2px solid #4caf50; }
        .summary-item.fail { border: 2px solid #f44336; }
        .summary-item h3 { margin: 0 0 5px 0; font-size: 0.9em; color: #888; }
        .summary-item .value { font-size: 1.8em; font-weight: bold; }
        .summary-item.pass .value { color: #4caf50; }
        .summary-item.fail .value { color: #f44336; }
        .page-section { background: #252540; padding: 20px; margin-bottom: 30px; border-radius: 8px; }
        .page-section.pass { border-left: 4px solid #4caf50; }
        .page-section.fail { border-left: 4px solid #f44336; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .page-header h2 { margin: 0; }
        .badge { padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        .badge.pass { background: #4caf50; color: white; }
        .badge.fail { background: #f44336; color: white; }
        .stats { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat { background: #1a1a2e; padding: 10px 15px; border-radius: 6px; }
        .stat-label { font-size: 0.8em; color: #888; }
        .stat-value { font-size: 1.1em; font-weight: bold; }
        .container { display: flex; gap: 15px; }
        .view { flex: 1; }
        .view h3 { text-align: center; margin: 0 0 10px 0; font-size: 0.9em; color: #888; }
        .view img { width: 100%; border: 2px solid #444; border-radius: 4px; display: block; }
    </style>
</head>
<body>
    <h1>Visual Regression Report</h1>

    <div class="summary">
        <div class="summary-grid">
            <div class="summary-item pass">
                <h3>Overall</h3>
                <div class="value">0/0</div>
            </div>
            
        </div>
    </div>

    
</body>
</html>
